# .gitlab-ci.yml
#
# Two independent pipelines, separated by `rules`:
#
#   * Branch / MR pipelines  -> hardware-in-the-loop tests on the rpi5 runner
#                               (diagnose + bind/unbind cycle against a real FTDI).
#   * Tag pipelines (v*)      -> build, SIGN, package, and publish a GitLab Release
#                               of the three signed Windows exes + the Linux/macOS
#                               scripts + the diagnosis scripts + an all-in-one
#                               bundle, each covered by SHA256SUMS. Mirrors the
#                               GitHub release in .github/workflows/release.yml.
#
# Signing reuses scripts/release-local.ps1 (the same build->test->sign->package
# path as the local "big red button"). Azure auth is OIDC (no stored secret)
# when AZURE_CLIENT_ID + a federated token are present; a masked
# AZURE_CLIENT_SECRET is the fallback for instances Entra cannot reach.
#
# RUNNER REQUIREMENTS for the tag pipeline (see windows/docs/SIGNING-AZURE-ARTIFACT.md):
#   * a runner tagged `windows` with: VS 2022 C++ build tools, CMake 3.20+,
#     the Azure CLI, and Microsoft.Azure.TrustedSigningClientTools installed.
#   * CI/CD variables: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_SUBSCRIPTION_ID
#     (identifiers); plus AZURE_CLIENT_SECRET (Masked + Protected) only if you
#     use the client-secret fallback instead of OIDC. Run
#     scripts/setup-gitlab-oidc.ps1 to create the OIDC federation.

variables:
  FTDI_VID_PID: "0403:6015"
  # GitLab Generic Package Registry location for the release assets.
  PKG_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ftdi-tools/${CI_COMMIT_TAG}"
  # libwdi version pinned in scripts/build-libwdi.ps1 (cache key).
  LIBWDI_VERSION: "v1.5.0"

stages:
  - diagnose
  - cycle
  - release

# ── Hardware-in-the-loop tests — branch / MR pipelines only ──────────────────
# (Excluded from tag pipelines so a release never waits on the Pi + device.)
.hw_rules: &hw_rules
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success

diagnose:
  stage: diagnose
  tags: [rpi5]
  <<: *hw_rules
  script:
    - bash diagnosis.sh "$FTDI_VID_PID"

bind-unbind-cycle:
  stage: cycle
  tags: [rpi5]
  <<: *hw_rules
  script:
    - sudo macos-linux/ftdi-unbind "$FTDI_VID_PID"
    - sleep 1
    - 'test -z "$(ls /dev/ttyUSB* 2>/dev/null)" && echo "PASS: no ttyUSB* after unbind" || { echo "FAIL: ttyUSB* still present after unbind"; exit 1; }'
    - sudo macos-linux/ftdi-bind "$FTDI_VID_PID"
    - sleep 1
    - 'ls /dev/ttyUSB* 2>/dev/null && echo "PASS: ttyUSB* present after rebind" || { echo "FAIL: no ttyUSB* after rebind"; exit 1; }'
  after_script:
    - sudo macos-linux/ftdi-bind "$FTDI_VID_PID" 2>/dev/null || true

# ── Build + sign + package + publish — tag pipelines, Windows runner ─────────
build-sign-release:
  stage: release
  tags: [windows]
  rules:
    - if: '$CI_COMMIT_TAG'
  needs: []                       # DAG: start immediately, independent of the hw jobs
  id_tokens:
    AZURE_FEDERATED_TOKEN:        # OIDC token GitLab mints for this job
      aud: api://AzureADTokenExchange
  cache:
    key: "libwdi-$LIBWDI_VERSION-windows"
    paths:
      - libwdi-out/
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  script:
    - |
      $ErrorActionPreference = 'Stop'
      # 1) libwdi — restore from cache or build it once
      if (-not (Test-Path libwdi-out/lib/libwdi.lib)) {
        pwsh -File scripts/build-libwdi.ps1 -LibwdiDir libwdi-src -OutDir libwdi-out
        if ($LASTEXITCODE) { throw "libwdi build failed" }
      }
    - |
      $ErrorActionPreference = 'Stop'
      # 2) Azure login — OIDC federated token preferred, client secret fallback
      if ($env:AZURE_CLIENT_ID -and $env:AZURE_FEDERATED_TOKEN) {
        az login --service-principal -u $env:AZURE_CLIENT_ID -t $env:AZURE_TENANT_ID --federated-token $env:AZURE_FEDERATED_TOKEN | Out-Null
      } elseif ($env:AZURE_CLIENT_ID -and $env:AZURE_CLIENT_SECRET) {
        az login --service-principal -u $env:AZURE_CLIENT_ID -t $env:AZURE_TENANT_ID -p $env:AZURE_CLIENT_SECRET | Out-Null
      } else {
        throw "No Azure credentials. Set AZURE_CLIENT_ID + OIDC (or AZURE_CLIENT_SECRET) as CI/CD variables."
      }
      if ($LASTEXITCODE) { throw "az login failed" }
    - |
      $ErrorActionPreference = 'Stop'
      # 3) build + test + SIGN + Windows package (reuses the local release button)
      pwsh -File scripts/release-local.ps1 -Version $env:CI_COMMIT_TAG `
        -LibwdiIncludeDir "$env:CI_PROJECT_DIR/libwdi-out/include" `
        -LibwdiLib "$env:CI_PROJECT_DIR/libwdi-out/lib/libwdi.lib"
      if ($LASTEXITCODE) { throw "release-local.ps1 failed" }
    - |
      $ErrorActionPreference = 'Stop'
      # 4) add Linux/macOS tarball + diagnosis scripts + all-in-one bundle; re-hash
      $tag = $env:CI_COMMIT_TAG
      $stage = "ftdi-tools-$tag"
      New-Item -ItemType Directory -Force "$stage/windows","$stage/linux-macos" | Out-Null
      Copy-Item dist/ftdi-unbind.exe,dist/ftdi-bind.exe,dist/ftdi-doctor.exe "$stage/windows"
      Copy-Item macos-linux/ftdi-unbind,macos-linux/ftdi-bind "$stage/linux-macos"
      Copy-Item diagnosis.ps1,diagnosis.cmd,diagnosis.sh,README.md $stage
      tar -czf "dist/ftdi-tools-$tag-linux-macos.tar.gz" -C macos-linux ftdi-unbind ftdi-bind
      Compress-Archive -Path $stage -DestinationPath "dist/ftdi-tools-$tag-all.zip" -Force
      Copy-Item diagnosis.ps1,diagnosis.cmd,diagnosis.sh dist/
      Remove-Item dist/SHA256SUMS -ErrorAction SilentlyContinue
      $sums = Get-ChildItem dist -File | ForEach-Object {
        "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower(), $_.Name }
      Set-Content dist/SHA256SUMS $sums -Encoding ascii
    - |
      $ErrorActionPreference = 'Stop'
      # 5) upload every asset to the Generic Package Registry
      Get-ChildItem dist -File | ForEach-Object {
        Invoke-RestMethod -Method Put -Headers @{ 'JOB-TOKEN' = $env:CI_JOB_TOKEN } `
          -InFile $_.FullName -Uri "$env:PKG_URL/$($_.Name)" | Out-Null
        Write-Host "uploaded $($_.Name)"
      }
    - |
      $ErrorActionPreference = 'Stop'
      # 6) create the GitLab Release linking the uploaded assets
      $tag = $env:CI_COMMIT_TAG
      $names = @(
        "ftdi-tools-$tag-windows-x64.zip",
        "ftdi-tools-$tag-linux-macos.tar.gz",
        "ftdi-tools-$tag-all.zip",
        "diagnosis.ps1","diagnosis.cmd","diagnosis.sh","SHA256SUMS")
      $links = $names | ForEach-Object { @{ name = $_; url = "$env:PKG_URL/$_" } }
      $body = @{ name = "ftdi-unbind $tag"; tag_name = $tag
        description = "Automated signed release. Verify downloads against SHA256SUMS."
        assets = @{ links = $links } } | ConvertTo-Json -Depth 6
      Invoke-RestMethod -Method Post -Uri "$env:CI_API_V4_URL/projects/$env:CI_PROJECT_ID/releases" `
        -Headers @{ 'JOB-TOKEN' = $env:CI_JOB_TOKEN; 'Content-Type' = 'application/json' } -Body $body | Out-Null
      Write-Host "Release $tag created."
