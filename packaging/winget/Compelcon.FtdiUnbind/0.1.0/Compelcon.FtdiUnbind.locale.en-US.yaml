ShortDescription: Unbind/rebind the OS FTDI serial driver to give libusb exclusive access
Description: |-
  ftdi-unbind switches an FTDI USB device from the Windows VCP (COM port)
  driver to WinUSB, giving libusb-based tools (pyftdi, WebUSB) exclusive
  access. ftdi-bind reverses the operation. ftdi-doctor lists attached FTDI
  devices and their current driver state.

  All three tools share a common CLI: --list, --dry-run, --serial SN,
  --all, --about, -h/--help. VID:PID format: 0403:6015.

  Signing: binaries are signed with Azure Artifact Signing (OIDC, cloud HSM).
